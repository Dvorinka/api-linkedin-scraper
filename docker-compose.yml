version: '3.8'

services:
  linkedin-scraper-api:
    build: .
    ports:
      - "30011:30011"
    environment:
      - PORT=30011
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LINKEDIN_SCRAPER_API_KEY=${LINKEDIN_SCRAPER_API_KEY:-dev-linkedin-scraper-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30011/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
