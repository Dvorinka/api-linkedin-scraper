openapi: 3.0.3
info:
  title: LinkedIn Scraper API
  description: API for scraping LinkedIn profiles and company information
  version: 1.0.0
  contact:
    name: API Services
  license:
    name: MIT

servers:
  - url: http://localhost:8095
    description: Development server
  - url: https://api.example.com
    description: Production server

paths:
  /healthz:
    get:
      summary: Health check endpoint
      description: Returns the health status of the service
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /v1/linkedin/profile:
    post:
      summary: Scrape LinkedIn profile
      description: Extract profile information from a LinkedIn profile URL
      tags:
        - Profile Data
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileInput'
      responses:
        '200':
          description: Successful profile scraping response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProfileResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/linkedin/company:
    post:
      summary: Scrape LinkedIn company
      description: Extract company information from a LinkedIn company URL
      tags:
        - Company Data
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
      responses:
        '200':
          description: Successful company scraping response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CompanyResult'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    ProfileInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: LinkedIn profile URL
          example: "https://www.linkedin.com/in/johndoe"
        include_posts:
          type: boolean
          description: Whether to include recent posts
          default: false
          example: true
        limit:
          type: integer
          description: Maximum number of posts to include
          minimum: 1
          maximum: 50
          example: 10

    CompanyInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: LinkedIn company URL
          example: "https://www.linkedin.com/company/acme-corp"
        include_posts:
          type: boolean
          description: Whether to include recent posts
          default: false
          example: true
        limit:
          type: integer
          description: Maximum number of posts to include
          minimum: 1
          maximum: 50
          example: 10

    Post:
      type: object
      properties:
        text:
          type: string
          description: Post text content
          example: "Excited to announce our new product launch!"
        url:
          type: string
          description: Post URL
          example: "https://www.linkedin.com/posts/123456789"
        published_at:
          type: string
          description: Post publication timestamp
          example: "2023-01-01T12:00:00Z"

    ProfileResult:
      type: object
      properties:
        url:
          type: string
          description: Profile URL
          example: "https://www.linkedin.com/in/johndoe"
        full_name:
          type: string
          description: Full name
          example: "John Doe"
        headline:
          type: string
          description: Profile headline
          example: "Software Engineer at Tech Corp"
        location:
          type: string
          description: Location
          example: "San Francisco, CA"
        about:
          type: string
          description: About section
          example: "Experienced software engineer with 5+ years in web development..."
        profile_image_url:
          type: string
          description: Profile image URL
          example: "https://media.licdn.com/dms/image/profile.jpg"
        posts:
          type: array
          description: Recent posts (if requested)
          items:
            $ref: '#/components/schemas/Post'

    CompanyResult:
      type: object
      properties:
        url:
          type: string
          description: Company URL
          example: "https://www.linkedin.com/company/acme-corp"
        name:
          type: string
          description: Company name
          example: "Acme Corporation"
        industry:
          type: string
          description: Industry
          example: "Information Technology and Services"
        size:
          type: string
          description: Company size
          example: "1001-5000 employees"
        website:
          type: string
          description: Company website
          example: "https://www.acme.com"
        headquarters:
          type: string
          description: Headquarters location
          example: "San Francisco, CA"
        about:
          type: string
          description: Company description
          example: "Leading provider of innovative solutions..."
        logo_url:
          type: string
          description: Company logo URL
          example: "https://media.licdn.com/dms/image/company-logo.png"
        posts:
          type: array
          description: Recent posts (if requested)
          items:
            $ref: '#/components/schemas/Post'

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "url is required"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: API key for authentication (format: "Bearer YOUR_API_KEY")

tags:
  - name: Health
    description: Health check endpoints
  - name: Profile Data
    description: LinkedIn profile scraping functionality
  - name: Company Data
    description: LinkedIn company information scraping
